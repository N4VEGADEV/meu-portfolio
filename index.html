<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker Terminal - Vanta</title>
    <style>
        /* Garante que o fundo ocupe a tela inteira e o conteúdo fique por cima */
        #vanta-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -1; /* Joga para trás de tudo */
        }

        body {
            margin: 0;
            color: #00FF41;
            font-family: 'Courier New', monospace;
        }

        .content {
            position: relative;
            z-index: 1; /* Garante que o texto fique na frente */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            pointer-events: none; /* Permite que o mouse interaja com o fundo através do texto */
        }
    </style>
</head>
<body>

    <div id="vanta-canvas"></div>

    <div class="content">
        <h1 style="background: rgba(0,0,0,0.7); padding: 20px;">SYSTEM OVERRIDE IN PROGRESS...</h1>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <script>
        VANTA.NET({
            el: "#vanta-canvas", // Seleciona a ID da nossa div
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0x00ff41,       // Cor das linhas (Verde Hacker)
            backgroundColor: 0x0,  // Fundo (Preto)
            points: 12.00,         // Quantidade de pontos
            maxDistance: 20.00,    // Distância de conexão
            spacing: 16.00         // Espaçamento
        })
    </script>
</body>
</html>
